<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="cadastro.css">
    <link rel="shortcut icon" href="img/bookswap.png" type="image/x-icon">
    <title>Cadastro BookSwap</title>
</head>
<body>
    <header class="header-page">

        <div class="header-icon">
            <img src="img/bookswap.png" alt="">
            <p class="title-header">Book<br>Swap</p>
        </div>

        <nav class="navbar-header">
            <ul>
                <li>
                    <a href="#">Swapping</a>
                </li>
                <li>
                    <a href="#">Shop</a>
                </li>
            </ul>
        </nav>

        <a href="index.html" class="cadastro-btn" id="cadastro-btn">
            Entrar
        </a>
    </header>

    <div class="container-cadastro">
        <div class="cadastro">
            <div class="container-logo">
                <img src="img/bookswap.png" alt="">
                <p>BookSwap</p>
            </div>
            <div>
                <form action="" class="form-cadastro">
                    <input type="text" name="" placeholder="Nome" id="name-input">
                    <input type="email" name="" id="email-cpf-input" placeholder="Email ou CPF" class="email-cpf-input">
                    <input type="password" name="" placeholder="Senha" id="password-input">
                    <button class="btn-form" id="btn-from">Cadastrar</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
